app = "labs"

[http_service]
auto_start_machines = true
auto_stop_machines = "suspend"  
force_https = true
internal_port = 3000
min_machines_running = 0
processes = [ "app" ]

[http_service.checks]
interval = "15s"
timeout = "2s"
grace_period = "5s"
method = "GET"
path = "/"

[mounts]
source = "labs_vol"
destination = "/app/submissions"

[processes]
app = "node app.js"
