<!DOCTYPE html>
<html>
<head>
  <title>HTML Editor</title>
  <link rel="stylesheet" href="https://codemirror.net/5/lib/codemirror.css">
  <link rel="stylesheet" href="/css/editor.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
  <div id="login-screen">
    <div>
      <h2>Enter Password</h2>
      <input type="password" id="password-input" />
      <button id="login-btn">Enter</button>
    </div>
  </div>
  <div id="editor-container">
    <div id="left-panel">
      <div id="controls">
        <select id="file-selector"></select>

        <div id="button-group">
          <button id="save-file" title="Save">
            <span class="material-symbols-outlined">save</span>
          </button>
          <button id="new-file" title="New File">
            <span class="material-symbols-outlined">note_add</span>
          </button>
          <button id="commit" title="Commit" style="background-color: #FF2E2E">
            <span class="material-symbols-outlined">commit</span>
          </button>
          |
          <button data-action="insert-header">Header</button>
          <button data-action="insert-footer-graded">Footer (graded)</button>
          <button data-action="insert-footer-grade-submitted">Footer (grade submitted)</button>
          |
          <button data-action="data-form">Data</button>
          <button data-action="answer-form">Answer</button>
          <button data-action="insert-dropdown">Dropdown Menu</button>
          <button data-action="insert-ai-question">AI Question</button>
          <button data-action="insert-open-ended">Open-Ended Question</button>
          |
          <button data-action="insert-lookup-system">Lookup Table</button>
          <button data-action="insert-linear-graph-system">Linear Graph</button>
          |
          <button data-action="insert-symbol"><sup>12</sup>C<sup>-</sup></button>
          <button data-action="insert-subscript">H<sub>2</sub>O</button>
          <button data-action="insert-image">Image</button>
          <button data-action="insert-table" title="Table">
            <span class="material-symbols-outlined">
              table
          </span>
          </button>
          <button data-action="insert-ul" title="Unordered List">
            <span class="material-symbols-outlined">
              format_list_bulleted
            </span>
          </button>
          <button data-action="insert-ol" title="Ordered List">
            <span class="material-symbols-outlined">
              format_list_numbered
            </span>
          </button>
          |
          <button data-action="insert-hidden">Hidden Text</button>

          
        </div>
      </div>
      <div id="editor" style="height: 90%; border: 1px solid #ccc;"></div>
    </div>
    <div id="right-panel">
      <iframe id="preview-frame"></iframe>
    </div>
  </div>
  <script type="module" src="/js/editor.js"></script>
</body>
</html>
