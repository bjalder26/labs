      <!-- Beginning -->


<p>A student dissolves sodium chloride (NaCl) in water.  What new intermolecular forces form between the dissolved particles and water molecules? Explain how you deduced the correct new intermolecular forces.</p>

  <textarea 
  class="AI text essay" 
  id="q26"
  name="q26"
  data-correct="
  1) Identify the new forces: ion–dipole, or ion-dipole forces, or ion-dipole interactions.
  2) Identify that water is polar, or has a dipole (moment), or has partial charges, or other similar meaning. 
  3) Identify that NaCl is an ionic compound, or that it forms ions in water, or that it forms Na+ (sodium ions) and Cl- (chloride) in water, or that it forms cations and anions in water."
  placeholder="Type your answer here...">
</textarea>

<button type="button" id="q26Button">
  Submit Answer for Grading and Feedback
</button>

<input
